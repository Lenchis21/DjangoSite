{% extends "app/layout.html" %}

{% block content %}
<h2 class="title">{{ title }}</h2>
<div class="container">
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-success">Добавить</button>
        <a href="{% url 'catalog' %}" class="btn btn-secondary">Отмена</a>
    </form>
</div>
{% endblock %}
