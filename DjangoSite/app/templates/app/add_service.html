{% extends "app/layout.html" %}

{% block content %}
<div class="container">
    <h1>Добавить услугу</h1>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-success">Добавить</button>
        <a href="{% url 'catalog' %}" class="btn btn-secondary">Отмена</a>
    </form>
</div>
{% endblock %}
