{% extends "app/layout.html" %}
{% load static %}

{% block content %}
<body>
    <div class="title">Главная страница</div>
    <div id="myCarousel" class="carousel slide" data-ride="carousel" data-interval="2000">

        <ol class="carousel-indicators">

            <li data-target="#myCarousel" data-slide-to="0" class="active"></li>

            <li data-target="#myCarousel" data-slide-to="1"></li>

            <li data-target="#myCarousel" data-slide-to="2"></li>

            <li data-target="#myCarousel" data-slide-to="3"></li>

        </ol>

        <div class="carousel-inner" role="listbox">

            <div class="item active">

                <img class ="img-slider" src="{% static 'app/content/4.png'%} " alt="Первый слайд" class="img-responsive" />

                <div class="carousel-caption" role="option">

                   

                </div>

            </div>

            <div class="item">

                <img class ="img-slider" src="{% static 'app/content/1.jpeg'%}" alt="Второй слайд" class="img-responsive" />

                <div class="carousel-caption" role="option">

                   

                </div>

            </div>

            <div class="item">

                <img  class ="img-slider" src=" {% static 'app/content/2.jpg'%} " alt="Третий слайд" class="img-responsive" />

                <div class="carousel-caption" role="option">

                   

                </div>

            </div>

        </div>

        <a class="left carousel-control" href="#myCarousel" role="button" data-slide="prev">

            <span class="glyphicon glyphicon-chevron-left" aria-hidden="true"></span>

            <span class="sr-only">Previous</span>

        </a>

        <a class="right carousel-control" href="#myCarousel" role="button" data-slide="next">

            <span class="glyphicon glyphicon-chevron-right" aria-hidden="true"></span>

            <span class="sr-only">Next</span>

        </a>

    </div>

</body>


{% endblock %}
